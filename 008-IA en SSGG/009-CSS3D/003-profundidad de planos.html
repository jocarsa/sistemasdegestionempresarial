<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Floating Divs</title>

<style>

    body{
        margin:0;
        overflow:hidden;
        background:white;
        width:100vw;
        height:100vh;
        position:relative;
        font-family:Arial, sans-serif;

        perspective:1200px;
        transform-style:preserve-3d;
    }

    .decor{
        position:absolute;
        transition:transform 0.5s;
        transform-style:preserve-3d;
    }

    .decor:hover{
        transform:
            translateZ(100px)
            scale(1.2);
    }

</style>
</head>
<body>

<script>

const colors = [
    "rgba(99,102,241,1)",
    "rgba(236,72,153,1)",
    "rgba(59,130,246,1)",
    "rgba(16,185,129,1)",
    "rgba(245,158,11,1)"
];

for(let i = 0; i < 60; i++){

    const div = document.createElement("div");
    div.className = "decor";

    const size = 40 + Math.random() * 180;

    div.style.width = size + "px";
    div.style.height = size + "px";

    div.style.left = Math.random() * window.innerWidth + "px";
    div.style.top = Math.random() * window.innerHeight + "px";

    div.style.background =
        colors[Math.floor(Math.random() * colors.length)];

    const z = -500 + Math.random() * 1000;

    div.style.transform = `translateZ(${z}px)`;

    document.body.appendChild(div);
}

</script>

</body>
</html>
