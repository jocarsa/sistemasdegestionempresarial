<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawer Cube with Detachable Squares</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .drawer-container {
            position: relative;
            width: 200px;
            height: 200px;
            perspective: 1000px;
        }

        .drawer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transform-style: preserve-3d;
        }

        .square {
            width: 180px;
            height: 180px;
            margin: 5px;
            background-color: rgba(50, 100, 200, 0.8);
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.5s ease, opacity 0.5s ease;
            position: absolute;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .square.detached {
            transform: translateZ(150px) rotateY(10deg) !important;
            opacity: 0.8;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="drawer-container">
        <div class="drawer" id="drawer">
            <div class="square" style="transform: translateZ(0px); background-color: rgba(255, 0, 0, 0.8);">File 1</div>
            <div class="square" style="transform: translateZ(-20px); background-color: rgba(0, 255, 0, 0.8);">File 2</div>
            <div class="square" style="transform: translateZ(-40px); background-color: rgba(0, 0, 255, 0.8);">File 3</div>
            <div class="square" style="transform: translateZ(-60px); background-color: rgba(255, 255, 0, 0.8);">File 4</div>
            <div class="square" style="transform: translateZ(-80px); background-color: rgba(255, 0, 255, 0.8);">File 5</div>
        </div>
    </div>

    <script>
        const squares = document.querySelectorAll('.square');

        squares.forEach((square) => {
            square.addEventListener('click', () => {
                if (square.classList.contains('detached')) {
                    square.classList.remove('detached');
                } else {
                    square.classList.add('detached');
                }
            });
        });
    </script>
</body>
</html>
