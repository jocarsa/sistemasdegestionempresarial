<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cube with Draggable Rotation</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .scene {
            width: 300px;
            height: 300px;
            perspective: 1000px;
            cursor: grab;
            user-select: none;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: rgba(0, 0, 0, 0.7);
            box-sizing: border-box;
        }

        .front  { transform: rotateY(0deg) translateZ(150px); background-color: rgba(255, 0, 0, 0.7); }
        .back   { transform: rotateY(180deg) translateZ(150px); background-color: rgba(0, 255, 0, 0.7); }
        .right  { transform: rotateY(90deg) translateZ(150px); background-color: rgba(0, 0, 255, 0.7); }
        .left   { transform: rotateY(-90deg) translateZ(150px); background-color: rgba(255, 255, 0, 0.7); }
        .top    { transform: rotateX(90deg) translateZ(150px); background-color: rgba(255, 0, 255, 0.7); }
        .bottom { transform: rotateX(-90deg) translateZ(150px); background-color: rgba(0, 255, 255, 0.7); }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cube" id="cube">
            <div class="face front">Front</div>
            <div class="face back">Back</div>
            <div class="face right">Right</div>
            <div class="face left">Left</div>
            <div class="face top">Top</div>
            <div class="face bottom">Bottom</div>
        </div>
    </div>

    <script>
        const cube = document.getElementById('cube');
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };

        // Random text for each face
        const randomTexts = [
            "Hello", "World", "Cube", "3D", "Drag", "Me"
        ];

        // Assign random text to each face
        const faces = document.querySelectorAll('.face');
        faces.forEach((face, index) => {
            face.textContent = randomTexts[index];
        });

        // Mouse down event
        cube.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
            cube.style.cursor = 'grabbing';
        });

        // Mouse up event
        document.addEventListener('mouseup', () => {
            isDragging = false;
            cube.style.cursor = 'grab';
        });

        // Mouse move event
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            currentRotation.y += deltaX * 0.5;
            currentRotation.x -= deltaY * 0.5;

            cube.style.transform = `
                rotateX(${currentRotation.x}deg)
                rotateY(${currentRotation.y}deg)
            `;

            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
    </script>
</body>
</html>
