<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS3D Text Containers</title>

<style>

    body{
        margin:0;
        overflow:hidden;
        background:white;
        width:100vw;
        height:100vh;
        position:relative;
        font-family:Arial,sans-serif;
        perspective:1200px;
        transform-style:preserve-3d;
    }

    #scene{
        position:absolute;
        width:100%;
        height:100%;
        transform-style:preserve-3d;
    }

    .decor{
        position:absolute;
        padding:22px;
        border-radius:24px;
        color:#111827;
        font-size:15px;
        line-height:1.45;
        font-weight:400;

        background:rgba(255,255,255,0.28);
        backdrop-filter:blur(18px);
        -webkit-backdrop-filter:blur(18px);

        border:1px solid rgba(255,255,255,0.55);

        box-shadow:
            0 20px 60px rgba(0,0,0,0.12),
            inset 0 1px 0 rgba(255,255,255,0.65);

        transform-style:preserve-3d;
        overflow:hidden;
    }

    .decor::before{
        content:"";
        position:absolute;
        inset:0;
        background:linear-gradient(
            135deg,
            rgba(255,255,255,0.55),
            rgba(255,255,255,0.08)
        );
        pointer-events:none;
    }

    .decor h2{
        position:relative;
        margin:0 0 10px 0;
        font-size:20px;
        font-weight:700;
        letter-spacing:-0.03em;
    }

    .decor p{
        position:relative;
        margin:0;
        opacity:0.75;
    }

</style>
</head>
<body>

<div id="scene"></div>

<script>

const scene = document.getElementById("scene");

const titles = [
    "Digital Horizon",
    "Creative System",
    "Visual Layer",
    "Soft Interface",
    "Floating Content",
    "Elegant Module",
    "Data Surface",
    "Design Panel"
];

const texts = [
    "A translucent container floating gently in a layered digital space.",
    "Depth, light and transparency combine to create a clean visual system.",
    "Each card behaves like a small fragment of information inside the scene.",
    "The interface keeps the original simplicity while adding spatial depth.",
    "Soft shadows and blur create a refined glass-like visual effect.",
    "Random content appears distributed through a subtle three-dimensional layout."
];

for(let i = 0; i < 60; i++){

    const div = document.createElement("div");
    div.className = "decor";

    const w = 180 + Math.random() * 180;
    const h = 110 + Math.random() * 90;

    div.style.width = w + "px";
    div.style.minHeight = h + "px";

    div.style.left =
        (Math.random() * window.innerWidth - w / 2)*2 + "px";

    div.style.top =
        (Math.random() * window.innerHeight - h / 2)*2 + "px";

    const z = -20000 + Math.random() * 20000;

    div.style.transform =
        `translateZ(${z}px)`;

    div.innerHTML = `
        <h2>${titles[Math.floor(Math.random() * titles.length)]}</h2>
        <p>${texts[Math.floor(Math.random() * texts.length)]}</p>
    `;

    scene.appendChild(div);
}

let cameraX = 0;
let cameraY = 0;
let cameraZ = 0;

document.addEventListener("mousemove",(e)=>{

    cameraX =
        (e.clientX / window.innerWidth - 0.5) * 1000;

    cameraY =
        (e.clientY / window.innerHeight - 0.5) * 1000;

    updateCamera();
});

document.addEventListener("wheel",(e)=>{

    cameraZ += e.deltaY;

    updateCamera();
});

function updateCamera(){

    scene.style.transform =
        `
        translate3d(
            ${-cameraX}px,
            ${-cameraY}px,
            ${cameraZ}px
        )
        `;
}

</script>

</body>
</html>
