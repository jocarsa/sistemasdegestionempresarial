<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS3D Floating Panels</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        width:100vw;
        height:100vh;
        background:
            radial-gradient(circle at center, #ffffff 0%, #f3f4f6 100%);
        perspective:1400px;
        transform-style:preserve-3d;
        position:relative;
        font-family:Ubuntu,Arial,sans-serif;
    }

    .scene{
        position:absolute;
        inset:0;
        transform-style:preserve-3d;
        animation:sceneRotate 40s linear infinite;
    }

    .decor{
        position:absolute;
        border-radius:24px;
        backdrop-filter:blur(10px);
        transform-style:preserve-3d;
        box-shadow:
            0 20px 40px rgba(0,0,0,0.08),
            inset 0 1px 1px rgba(255,255,255,0.6);
        border:1px solid rgba(255,255,255,0.35);
        transition:
            transform 0.6s ease,
            box-shadow 0.6s ease;
        opacity:0.9;
    }

    .decor::before{
        content:"";
        position:absolute;
        inset:0;
        border-radius:inherit;
        background:
            linear-gradient(
                135deg,
                rgba(255,255,255,0.45),
                rgba(255,255,255,0.02)
            );
    }

    .decor:hover{
        transform:
            translateZ(120px)
            scale(1.15)
            rotateY(15deg)
            rotateX(10deg);
        box-shadow:
            0 40px 80px rgba(0,0,0,0.15);
    }

    @keyframes sceneRotate{
        0%{
            transform:rotateX(0deg) rotateY(0deg);
        }
        100%{
            transform:rotateX(360deg) rotateY(360deg);
        }
    }

</style>
</head>
<body>

<div class="scene" id="scene"></div>

<script>

const scene = document.getElementById("scene");

const colors = [
    "linear-gradient(135deg,#6366f1,#8b5cf6)",
    "linear-gradient(135deg,#ec4899,#f43f5e)",
    "linear-gradient(135deg,#3b82f6,#06b6d4)",
    "linear-gradient(135deg,#10b981,#34d399)",
    "linear-gradient(135deg,#f59e0b,#f97316)"
];

for(let i = 0; i < 80; i++){

    const div = document.createElement("div");
    div.className = "decor";

    const size = 40 + Math.random() * 220;

    div.style.width = size + "px";
    div.style.height = size + "px";

    div.style.left = (Math.random() * window.innerWidth - size/2) + "px";
    div.style.top = (Math.random() * window.innerHeight - size/2) + "px";

    div.style.background =
        colors[Math.floor(Math.random() * colors.length)];

    const z = -1000 + Math.random() * 2000;

    const rx = Math.random() * 360;
    const ry = Math.random() * 360;
    const rz = Math.random() * 360;

    div.style.transform = `
        translateZ(${z}px)
        rotateX(${rx}deg)
        rotateY(${ry}deg)
        rotateZ(${rz}deg)
    `;

    scene.appendChild(div);
}

document.addEventListener("mousemove",(e)=>{

    const x = (e.clientX / window.innerWidth - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * -30;

    scene.style.transform =
        `rotateX(${y}deg) rotateY(${x}deg)`;
});

</script>

</body>
</html>
