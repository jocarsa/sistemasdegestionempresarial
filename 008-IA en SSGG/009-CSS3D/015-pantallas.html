<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic CSS3D Cylinder</title>

<style>
*{ box-sizing:border-box; }

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at center, #ffffff 0%, #eef2f7 55%, #dbe4f0 100%);
}

#camera{
    position:fixed;
    inset:0;
    overflow:hidden;
    perspective:720px;
    perspective-origin:50% 50%;
}

#world{
    position:absolute;
    left:50%;
    top:50%;
    width:0;
    height:0;
    transform-style:preserve-3d;
    transition:transform 900ms cubic-bezier(.16,1,.3,1);
}

.screen{
    position:absolute;
    width:720px;
    height:420px;
    left:-360px;
    top:-210px;
    padding:34px;
    border-radius:30px;

    background:rgba(255,255,255,.74);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.9);
    box-shadow:
        0 40px 90px rgba(15,23,42,.25),
        inset 0 1px 0 rgba(255,255,255,.95);

    transform-style:preserve-3d;
    backface-visibility:hidden;
}

.screen::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:30px;
    pointer-events:none;
    background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.9), transparent 34%),
        linear-gradient(135deg, rgba(99,102,241,.12), rgba(249,115,22,.1));
}

.inner{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.kicker{
    text-transform:uppercase;
    letter-spacing:4px;
    font-size:12px;
    font-weight:bold;
    color:#6366f1;
}

h1{
    margin:16px 0 10px;
    font-size:48px;
    line-height:1;
    color:#0f172a;
}

p{
    max-width:540px;
    font-size:17px;
    line-height:1.65;
    color:#475569;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.card{
    padding:18px;
    border-radius:22px;
    background:rgba(255,255,255,.65);
    border:1px solid rgba(255,255,255,.82);
    box-shadow:0 18px 36px rgba(15,23,42,.1);
}

.card strong{
    display:block;
    font-size:25px;
    color:#111827;
}

.card span{
    color:#64748b;
    font-size:14px;
}

#hint{
    position:fixed;
    top:28px;
    right:32px;
    z-index:10;
    padding:12px 18px;
    border-radius:999px;
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(14px);
    color:#475569;
    box-shadow:0 18px 40px rgba(15,23,42,.12);
}
</style>
</head>

<body>

<div id="hint">Scroll to move between screens</div>

<div id="camera">
    <div id="world"></div>
</div>

<script>
const world = document.getElementById("world");

const modules = [
    "Dashboard","Customers","Invoices","Products","Analytics",
    "Tasks","Calendar","Projects","Support","Settings",
    "Documents","Automation","Reports","Inventory","Users",
    "Sales","Purchases","Finance","Employees","Notifications"
];

const total = modules.length;

let current = 0;
let locked = false;
let mouseX = 0;
let mouseY = 0;

let step = 0;
let radius = 0;

modules.forEach((title, i) => {
    const screen = document.createElement("section");
    screen.className = "screen";

    screen.innerHTML = `
        <div class="inner">
            <div>
                <div class="kicker">Module ${String(i + 1).padStart(2, "0")}</div>
                <h1>${title}</h1>
                <p>
                    This screen belongs to a dynamically calculated CSS3D cylinder.
                    The radius adapts to the number and width of the panels.
                </p>
            </div>

            <div class="cards">
                <div class="card"><strong>${120 + i}</strong><span>Records</span></div>
                <div class="card"><strong>${30 + i}</strong><span>Actions</span></div>
                <div class="card"><strong>${Math.max(70, 96 - i)}%</strong><span>Status</span></div>
            </div>
        </div>
    `;

    world.appendChild(screen);
});

const screens = document.querySelectorAll(".screen");

function calculateCylinder(){
    const screenWidth = screens[0].offsetWidth;
    const gap = 90;

    step = 360 / total;

    const side = screenWidth + gap;
    radius = side / (2 * Math.tan(Math.PI / total));

    screens.forEach((screen, i) => {
        const angle = i * step;

        screen.style.transform = `
            rotateY(${angle}deg)
            translateZ(-${radius}px)
        `;
    });

    render();
}

function render(){
    world.style.transform = `
        translateZ(${radius}px)
        rotateX(${mouseY}deg)
        rotateY(${-current * step + mouseX}deg)
    `;
}

window.addEventListener("wheel", e => {
    if(locked) return;

    locked = true;

    current += e.deltaY > 0 ? 1 : -1;

    if(current < 0) current = total - 1;
    if(current >= total) current = 0;

    render();

    setTimeout(() => locked = false, 800);
}, { passive:true });

window.addEventListener("mousemove", e => {
    mouseX = (e.clientX / window.innerWidth - .5) * 8;
    mouseY = (e.clientY / window.innerHeight - .5) * -5;
    render();
});

window.addEventListener("resize", calculateCylinder);

calculateCylinder();
</script>

</body>
</html>
